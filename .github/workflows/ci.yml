name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Run library tests
        run: cargo test --lib --features tui

      - name: Build TUI binary (zero warnings)
        run: cargo build --bin tt-toplike-tui --features tui
        env:
          RUSTFLAGS: -D warnings
